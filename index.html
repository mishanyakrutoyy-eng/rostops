<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>RostOps | AI Консультант</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f7fc;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 0% 0%, rgba(79, 70, 229, 0.03), transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.03), transparent 50%);
            pointer-events: none;
        }

        .chat-container {
            max-width: 880px;
            width: 100%;
            height: 92vh;
            min-height: 540px;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-header {
            padding: 20px 24px 18px 24px;
            background: #ffffff;
            border-bottom: 1px solid #eff2f9;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .avatar-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
            flex-shrink: 0;
        }

        .avatar-icon i {
            font-size: 22px;
            color: white;
        }

        .header-text {
            flex: 1;
        }

        .header-text h2 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #111827;
            font-family: 'Space Grotesk', monospace;
        }

        .header-text p {
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 3px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .server-badge {
            background: #f3f4f6;
            padding: 3px 10px;
            border-radius: 40px;
            font-size: 0.65rem;
            font-family: 'Space Grotesk', monospace;
            color: #4b5563;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f9fafb;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #10b981;
            font-weight: 500;
            flex-shrink: 0;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: #ffffff;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #f1f1f5;
            border-radius: 10px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 85%;
            animation: messageIn 0.25s ease-out;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .message-icon {
            width: 32px;
            height: 32px;
            background: #f3f4f6;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .user-icon {
            background: #4f46e5;
            color: white;
        }

        .assistant-icon {
            background: #f3f4f6;
            color: #4f46e5;
        }

        .message-bubble {
            padding: 10px 16px;
            font-size: 0.9rem;
            line-height: 1.45;
            border-radius: 20px;
            word-break: break-word;
            font-weight: 400;
        }

        .user-message .message-bubble {
            background: #4f46e5;
            color: white;
            border-radius: 20px 20px 4px 20px;
        }

        .assistant-message .message-bubble {
            background: #f9fafb;
            color: #1f2937;
            border-radius: 20px 20px 20px 4px;
            border: 1px solid #eff2f9;
        }

        .message-time {
            font-size: 0.6rem;
            color: #9ca3af;
            margin-top: 5px;
            margin-left: 8px;
        }

        .user-message .message-time {
            text-align: right;
            margin-right: 4px;
        }

        .typing-indicator-minimal {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f9fafb;
            padding: 10px 16px;
            border-radius: 20px;
            width: fit-content;
            border: 1px solid #eff2f9;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #9ca3af;
            border-radius: 50%;
            display: inline-block;
            animation: typingFade 1.2s infinite ease;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingFade {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-3px); }
        }

        .input-area {
            padding: 14px 20px 20px 20px;
            background: #ffffff;
            border-top: 1px solid #eff2f9;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: #f9fafb;
            border-radius: 28px;
            padding: 6px 6px 6px 18px;
            border: 1px solid #eef2f8;
            transition: all 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: #4f46e5;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.08);
        }

        #userInput {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            color: #111827;
            resize: none;
            outline: none;
            line-height: 1.4;
        }

        #userInput::placeholder {
            color: #9ca3af;
            font-weight: 400;
            font-size: 0.9rem;
        }

        #sendBtn {
            background: #4f46e5;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        #sendBtn:hover {
            background: #6366f1;
            transform: scale(0.96);
        }

        #sendBtn:active {
            transform: scale(0.92);
        }

        .info-footer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            font-size: 0.65rem;
            color: #9ca3af;
            flex-wrap: wrap;
            text-align: center;
        }

        @media (max-width: 640px) {
            body { padding: 0; background: #ffffff; }
            .chat-container { height: 100vh; border-radius: 0; box-shadow: none; }
            .chat-header { padding: 16px 16px 12px 16px; }
            .avatar-icon { width: 40px; height: 40px; }
            .avatar-icon i { font-size: 20px; }
            .header-text h2 { font-size: 1.1rem; }
            .messages-area { padding: 16px 12px 12px 12px; gap: 16px; }
            .message { max-width: 92%; }
            .message-bubble { padding: 10px 14px; font-size: 0.88rem; }
            .input-area { padding: 12px 12px 16px 12px; }
            #sendBtn { width: 42px; height: 42px; }
        }

        @media (min-width: 641px) and (max-width: 900px) {
            .chat-container { height: 88vh; max-width: 720px; }
            .message { max-width: 80%; }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar-icon">
            <i class="fas fa-brain"></i>
        </div>
        <div class="header-text">
            <h2>RostOps <span style="font-size: 0.7rem;">| AI Consultant</span></h2>
            <p>
                <span class="server-badge"><i class="fas fa-server"></i> Test Server 1.823.510</span>
                <span><i class="fas fa-microchip"></i> GPT-3.5 Turbo</span>
            </p>
        </div>
        <div class="status-indicator">
            <div class="pulse-dot"></div>
            <span>API active</span>
        </div>
    </div>

    <div class="messages-area" id="messagesArea"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" rows="1" placeholder="Написать..."></textarea>
            <button id="sendBtn"><i class="fas fa-arrow-up"></i></button>
        </div>
        <div class="info-footer">
            <i class="fas fa-robot"></i> Работает через OpenRouter API (GPT-3.5 Turbo) — реальный AI
            <i class="fas fa-bolt"></i> отвечает как эксперт RostOps
        </div>
    </div>
</div>

<script>
    // ============================================
    // RostOps | РЕАЛЬНЫЙ API (OpenRouter)
    // API ключ вставлен, всё работает!
    // ============================================
    
    const API_KEY = "api_key = sk-GZxVSQwhEAqWhBqrrdf2zii1VNBV3qKuYcgFJs7T8tZ7uJU7XlTcCRFA9Zwt";
    const API_URL = "https://openrouter.ai/api/v1/chat/completions";
    
    const SYSTEM_PROMPT = `Ты — AI-консультант компании RostOps, эксперт по внедрению искусственного интеллекта в бизнес.
    
Компания RostOps предоставляет полный спектр AI-решений:
- 🎯 Стратегия AI-трансформации и аудит бизнес-процессов
- 🤖 Кастомные LLM-агенты, RAG-чатботы с интеграцией в Telegram, сайты, CRM
- 📊 Предиктивная аналитика (прогнозы продаж, оттока клиентов, оптимизация запасов)
- ⚙️ Интеграция AI в CRM/ERP (1С, SAP, Битрикс24, Salesforce)
- 👁️ Компьютерное зрение для контроля качества, безопасности, видеоаналитики
- ☁️ MLOps и облачные платформы (AWS SageMaker, Azure AI, GCP)
- 🎓 Обучение AI-компетенциям команд и технические воркшопы

Правила общения:
- Отвечай ТОЛЬКО на русском языке, дружелюбно и профессионально
- Всегда представляйся как консультант RostOps
- Если спрашивают о стоимости: отвечай, что стоимость индивидуальная, пилотный проект от 250 000 рублей
- Контакты компании: hello@rostops.ai
- Будь полезным, предлагай конкретные решения под задачи клиента
- Используй умеренно эмодзи для дружелюбного тона
- Если вопрос не связан с AI/бизнесом — вежливо направь в русло внедрения AI

Твоя цель — помочь клиенту подобрать оптимальное AI-решение для его бизнеса.`;

    let conversationHistory = [];

    function getTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(role, text) {
        const container = document.getElementById('messagesArea');
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        const isUser = role === 'user';
        if (isUser) messageDiv.classList.add('user-message');
        else messageDiv.classList.add('assistant-message');

        const icon = document.createElement('div');
        icon.classList.add('message-icon');
        if (isUser) {
            icon.classList.add('user-icon');
            icon.innerHTML = '<i class="fas fa-user"></i>';
        } else {
            icon.classList.add('assistant-icon');
            icon.innerHTML = '<i class="fas fa-robot"></i>';
        }

        const bubbleWrapper = document.createElement('div');
        bubbleWrapper.style.display = 'flex';
        bubbleWrapper.style.flexDirection = 'column';
        bubbleWrapper.style.maxWidth = '100%';

        const bubble = document.createElement('div');
        bubble.classList.add('message-bubble');
        bubble.innerText = text;

        const timeSpan = document.createElement('div');
        timeSpan.classList.add('message-time');
        timeSpan.innerHTML = `<i class="far fa-clock"></i> ${getTime()}`;

        bubbleWrapper.appendChild(bubble);
        bubbleWrapper.appendChild(timeSpan);
        messageDiv.appendChild(icon);
        messageDiv.appendChild(bubbleWrapper);
        container.appendChild(messageDiv);
        container.scrollTop = container.scrollHeight;
        return messageDiv;
    }

    let typingDiv = null;
    function showTyping() {
        if (typingDiv) return;
        const container = document.getElementById('messagesArea');
        const div = document.createElement('div');
        div.classList.add('message', 'assistant-message');
        div.id = 'typingMsg';
        const icon = document.createElement('div');
        icon.classList.add('message-icon', 'assistant-icon');
        icon.innerHTML = '<i class="fas fa-robot"></i>';
        const wrapper = document.createElement('div');
        wrapper.style.display = 'flex';
        wrapper.style.flexDirection = 'column';
        const typingBlock = document.createElement('div');
        typingBlock.className = 'typing-indicator-minimal';
        typingBlock.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span><span style="margin-left:6px; font-size:0.7rem;">AI анализирует...</span>';
        wrapper.appendChild(typingBlock);
        div.appendChild(icon);
        div.appendChild(wrapper);
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        typingDiv = div;
    }

    function hideTyping() {
        if (typingDiv) {
            typingDiv.remove();
            typingDiv = null;
        }
    }

    // Функция запроса к реальному API OpenRouter
    async function callAIAPI(userMessage, history) {
        const messages = [
            { role: "system", content: SYSTEM_PROMPT },
            ...history.slice(-12).map(msg => ({
                role: msg.role === 'user' ? 'user' : 'assistant',
                content: msg.content
            })),
            { role: "user", content: userMessage }
        ];

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`,
                    'HTTP-Referer': window.location.origin,
                    'X-Title': 'RostOps AI Consultant'
                },
                body: JSON.stringify({
                    model: "openai/gpt-3.5-turbo",
                    messages: messages,
                    temperature: 0.75,
                    max_tokens: 600
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                console.error('API Error:', errorData);
                throw new Error(`API error: ${response.status}`);
            }

            const data = await response.json();
            return data.choices[0].message.content;
            
        } catch (error) {
            console.error('API call failed:', error);
            return "⚠️ Произошла ошибка. Мы в процессе восстановления.";
        }
    }

    async function getAIResponse(userMessage, history) {
        return await callAIAPI(userMessage, history);
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        input.style.height = 'auto';

        addMessage('user', text);
        conversationHistory.push({ role: 'user', content: text });

        showTyping();
        
        await new Promise(r => setTimeout(r, 200));
        
        const reply = await getAIResponse(text, conversationHistory);
        hideTyping();

        addMessage('assistant', reply);
        conversationHistory.push({ role: 'assistant', content: reply });

        if (conversationHistory.length > 24) {
            conversationHistory = conversationHistory.slice(-18);
        }
    }

    function autoResize() {
        const ta = document.getElementById('userInput');
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
    }

    function init() {
        const container = document.getElementById('messagesArea');
        container.innerHTML = '';

        const welcomeMsg = "Приветствую! 👋 Я AI-консультант RostOps. Помогаю бизнесу внедрять искусственный интеллект: от стратегии до готовых решений. Расскажите о вашем проекте — предложу оптимальный подход.";
        
        const welcomeDiv = document.createElement('div');
        welcomeDiv.classList.add('message', 'assistant-message');
        const icon = document.createElement('div');
        icon.classList.add('message-icon', 'assistant-icon');
        icon.innerHTML = '<i class="fas fa-robot"></i>';
        const bubbleWrap = document.createElement('div');
        bubbleWrap.style.display = 'flex';
        bubbleWrap.style.flexDirection = 'column';
        const bubble = document.createElement('div');
        bubble.classList.add('message-bubble');
        bubble.innerText = welcomeMsg;
        const timeSpan = document.createElement('div');
        timeSpan.classList.add('message-time');
        timeSpan.innerHTML = `<i class="far fa-clock"></i> ${getTime()}`;
        bubbleWrap.appendChild(bubble);
        bubbleWrap.appendChild(timeSpan);
        welcomeDiv.appendChild(icon);
        welcomeDiv.appendChild(bubbleWrap);
        container.appendChild(welcomeDiv);

        conversationHistory = [{ role: 'assistant', content: welcomeMsg }];

        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        userInput.addEventListener('input', autoResize);
        userInput.focus();
        
        setTimeout(() => {
            if (window.innerWidth <= 768) {
                userInput.blur();
            }
        }, 100);
        
        // Проверка API при старте
        console.log('API Key loaded, ready to chat!');
    }

    init();
</script>
</body>
</html>
