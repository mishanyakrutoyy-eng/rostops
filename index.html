<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RostOps | AI Консультант</title>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter + Space Grotesk for modern minimalism -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fc;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }

        /* subtle gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.03), transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.03), transparent 50%);
            pointer-events: none;
        }

        /* main container - clean glassmorphism */
        .chat-container {
            max-width: 880px;
            width: 100%;
            height: 88vh;
            min-height: 580px;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* header - minimal, airy */
        .chat-header {
            padding: 24px 28px 20px 28px;
            background: #ffffff;
            border-bottom: 1px solid #eff2f9;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .avatar-icon i {
            font-size: 24px;
            color: white;
        }

        .header-text h2 {
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #111827;
            font-family: 'Space Grotesk', monospace;
        }

        .header-text p {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .server-badge {
            background: #f3f4f6;
            padding: 3px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-family: 'Space Grotesk', monospace;
            color: #4b5563;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-indicator {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f9fafb;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #10b981;
            font-weight: 500;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* messages area - clean & spacious */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 28px 16px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #ffffff;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #f1f1f5;
            border-radius: 10px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* message bubbles - minimal */
        .message {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            max-width: 80%;
            animation: messageIn 0.25s ease-out;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .message-icon {
            width: 32px;
            height: 32px;
            background: #f3f4f6;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .user-icon {
            background: #4f46e5;
            color: white;
        }

        .assistant-icon {
            background: #f3f4f6;
            color: #4f46e5;
        }

        .message-bubble {
            padding: 10px 18px;
            font-size: 0.9rem;
            line-height: 1.45;
            border-radius: 20px;
            word-break: break-word;
            font-weight: 400;
        }

        .user-message .message-bubble {
            background: #4f46e5;
            color: white;
            border-radius: 20px 20px 4px 20px;
        }

        .assistant-message .message-bubble {
            background: #f9fafb;
            color: #1f2937;
            border-radius: 20px 20px 20px 4px;
            border: 1px solid #eff2f9;
        }

        .message-time {
            font-size: 0.6rem;
            color: #9ca3af;
            margin-top: 6px;
            margin-left: 8px;
            letter-spacing: 0.2px;
        }

        .user-message .message-time {
            text-align: right;
            margin-right: 4px;
        }

        /* typing indicator - minimal dots */
        .typing-indicator-minimal {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f9fafb;
            padding: 10px 18px;
            border-radius: 20px;
            width: fit-content;
            border: 1px solid #eff2f9;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #9ca3af;
            border-radius: 50%;
            display: inline-block;
            animation: typingFade 1.2s infinite ease;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingFade {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-3px); }
        }

        /* input area - minimal and clean */
        .input-area {
            padding: 16px 28px 24px 28px;
            background: #ffffff;
            border-top: 1px solid #eff2f9;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #f9fafb;
            border-radius: 28px;
            padding: 6px 6px 6px 20px;
            border: 1px solid #eef2f8;
            transition: all 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: #4f46e5;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.08);
        }

        #userInput {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            color: #111827;
            resize: none;
            outline: none;
        }

        #userInput::placeholder {
            color: #9ca3af;
            font-weight: 400;
        }

        #sendBtn {
            background: #4f46e5;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 42px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        #sendBtn:hover {
            background: #6366f1;
            transform: scale(0.96);
        }

        #sendBtn:active {
            transform: scale(0.92);
        }

        .info-footer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 14px;
            font-size: 0.65rem;
            color: #9ca3af;
        }

        .info-footer i {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        /* responsive */
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            .chat-container {
                height: 94vh;
                border-radius: 24px;
            }
            .message {
                max-width: 92%;
            }
            .chat-header {
                padding: 18px 20px;
            }
            .messages-area {
                padding: 16px 20px;
            }
            .input-area {
                padding: 12px 20px 20px;
            }
            .header-text h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar-icon">
            <i class="fas fa-brain"></i>
        </div>
        <div class="header-text">
            <h2>RostOps</h2>
            <p>
                <span class="server-badge"><i class="fas fa-server"></i> Test Server 1.823.510</span>
                <span><i class="fas fa-microchip"></i> AI Consulting</span>
            </p>
        </div>
        <div class="status-indicator">
            <div class="pulse-dot"></div>
            <span>online</span>
        </div>
    </div>

    <div class="messages-area" id="messagesArea"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" rows="1" placeholder="Спросите о внедрении AI, аналитике, чат-ботах..."></textarea>
            <button id="sendBtn"><i class="fas fa-arrow-up"></i></button>
        </div>
        <div class="info-footer">
            <i class="fas fa-robot"></i> AI-консультант RostOps
            <i class="fas fa-lock"></i> экспертиза в LLM, CV, ML
        </div>
    </div>
</div>

<script>
    // ============================================
    // RostOps | Minimal AI Consultant
    // Role: эксперт по внедрению AI в бизнес
    // ============================================

    const company = {
        name: "RostOps",
        services: [
            "Стратегия AI-трансформации и аудит процессов",
            "Кастомные LLM-агенты, RAG-чатботы",
            "Предиктивная аналитика (прогнозы продаж, оттока)",
            "Интеграция AI в CRM/ERP (1С, SAP, Битрикс24)",
            "Компьютерное зрение для контроля качества",
            "MLOps и облачные платформы (AWS, Azure)",
            "Обучение AI-компетенциям команд"
        ],
        contact: "hello@rostops.ai"
    };

    let conversationHistory = [];

    function getTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // UI helpers
    function addMessage(role, text) {
        const container = document.getElementById('messagesArea');
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        const isUser = role === 'user';
        if (isUser) messageDiv.classList.add('user-message');
        else messageDiv.classList.add('assistant-message');

        const icon = document.createElement('div');
        icon.classList.add('message-icon');
        if (isUser) {
            icon.classList.add('user-icon');
            icon.innerHTML = '<i class="fas fa-user"></i>';
        } else {
            icon.classList.add('assistant-icon');
            icon.innerHTML = '<i class="fas fa-robot"></i>';
        }

        const bubbleWrapper = document.createElement('div');
        bubbleWrapper.style.display = 'flex';
        bubbleWrapper.style.flexDirection = 'column';
        bubbleWrapper.style.maxWidth = '100%';

        const bubble = document.createElement('div');
        bubble.classList.add('message-bubble');
        bubble.innerText = text;

        const timeSpan = document.createElement('div');
        timeSpan.classList.add('message-time');
        timeSpan.innerHTML = `<i class="far fa-clock"></i> ${getTime()}`;

        bubbleWrapper.appendChild(bubble);
        bubbleWrapper.appendChild(timeSpan);
        messageDiv.appendChild(icon);
        messageDiv.appendChild(bubbleWrapper);
        container.appendChild(messageDiv);
        container.scrollTop = container.scrollHeight;
        return messageDiv;
    }

    let typingDiv = null;
    function showTyping() {
        if (typingDiv) return;
        const container = document.getElementById('messagesArea');
        const div = document.createElement('div');
        div.classList.add('message', 'assistant-message');
        div.id = 'typingMsg';
        const icon = document.createElement('div');
        icon.classList.add('message-icon', 'assistant-icon');
        icon.innerHTML = '<i class="fas fa-robot"></i>';
        const wrapper = document.createElement('div');
        wrapper.style.display = 'flex';
        wrapper.style.flexDirection = 'column';
        const typingBlock = document.createElement('div');
        typingBlock.className = 'typing-indicator-minimal';
        typingBlock.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
        wrapper.appendChild(typingBlock);
        div.appendChild(icon);
        div.appendChild(wrapper);
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        typingDiv = div;
    }

    function hideTyping() {
        if (typingDiv) {
            typingDiv.remove();
            typingDiv = null;
        }
    }

    // Core AI response engine (role: консультант RostOps)
    function generateResponse(userMessage, history) {
        const msg = userMessage.toLowerCase();

        // Greeting
        if (msg.match(/привет|здравствуй|добрый день|добрый вечер|hi|hello|hey/i) && !msg.match(/услуг|чат|бот|ai/)) {
            return "Добрый день! Я AI-консультант RostOps. Помогаю бизнесу внедрять искусственный интеллект: от чат-ботов до предиктивной аналитики. Расскажите о вашей задаче — подберу решение.";
        }

        // Services
        if (msg.match(/услуги|направления|что вы делаете|список|предлагаете|компетенции/i)) {
            const list = company.services.map(s => `• ${s}`).join('\n');
            return `Мы предлагаем полный спектр AI-решений:\n${list}\n\nКакое направление вам ближе? Могу рассказать детали по любому пункту.`;
        }

        // Chatbots / LLM
        if (msg.match(/чат-бот|чатбот|llm|gpt|нейросеть|диалоговый|rag|ассистент/i)) {
            return "Мы создаём умных AI-ассистентов на базе LLM с подключением к базе знаний компании (RAG). Интеграция в Telegram, сайты, CRM. Сокращаем нагрузку на поддержку до 70%. Интересует пилотный проект?";
        }

        // Predictive analytics
        if (msg.match(/аналитик|прогнозировани|ml|машинное обучение|прогноз|предсказание|big data/i)) {
            return "Предиктивная аналитика — наша экспертиза. Строим модели для прогноза продаж, оттока клиентов, оптимизации запасов. Работаем с временными рядами, градиентным бустингом, нейросетями. Расскажите о ваших данных?";
        }

        // Integrations
        if (msg.match(/crm|erp|1с|sap|битрикс|salesforce|интеграция|api|внедрение в систему/i)) {
            return "Интегрируем AI-модули напрямую в ваши CRM/ERP: автозаполнение, скоринг, интеллектуальные рекомендации. Поддерживаем REST API, SOAP, кастомные адаптеры. Какая платформа используется?";
        }

        // Computer vision
        if (msg.match(/компьютерное зрение|cv|распознавание|видеоаналитика|детекция|качество продукции/i)) {
            return "Компьютерное зрение от RostOps: детекция дефектов, контроль безопасности, тепловые карты трафика. Внедряем на производстве, складах, в ритейле. Покажем кейсы под вашу отрасль.";
        }

        // Strategy / consulting
        if (msg.match(/стратегия|консалтинг|аудит|с чего начать|дорожная карта|ai трансформация/i)) {
            return "Стратегический AI-аудит — первый шаг. Определяем точки максимального ROI, составляем дорожную карту, подбираем технологии. Проводим бесплатную диагностическую сессию. Интересно?";
        }

        // Pricing
        if (msg.match(/стоимость|цена|сколько стоит|бюджет|прайс|расценки|оплата/i)) {
            return "Стоимость рассчитывается индивидуально. Пилотный MVP (чат-бот / аналитика) — от 250 000₽, комплексные проекты — от 1 млн ₽. Оставьте контакт — подготовим детальное КП.";
        }

        // Contacts
        if (msg.match(/контакт|связаться|написать|email|почта|телефон|как связаться/i)) {
            return `Связаться с нами: ${company.contact} или через форму на сайте rostops.ai. Можете оставить запрос здесь — я передам менеджеру.`;
        }

        // Training
        if (msg.match(/обучение|тренинг|курсы|обучить сотрудников|workshop/i)) {
            return "RostOps Academy: проводим воркшопы для IT-команд и обучение AI-грамотности для руководителей. Программы адаптируем под ваш уровень. Сколько человек в команде?";
        }

        // Why us
        if (msg.match(/почему вы|преимущества|опыт|кейсы|реализованные проекты/i)) {
            return "40+ успешных AI-проектов в ритейле, финансах, логистике. Работаем под ключ с пост-релизной поддержкой. Можем поделиться кейсами под NDA. Хотите ознакомиться?";
        }

        // Thanks / bye
        if (msg.match(/спасибо|благодарю|отлично|понятно|до свидания|пока/i) && !msg.match(/услуг|стоим|чат/)) {
            return "Рад был помочь! Если появятся вопросы — я здесь. Хотите получить гайд по внедрению AI в бизнес? Просто скажите «да».";
        }

        // Short / vague
        if (userMessage.length < 30 && (msg.match(/помощь|нужна консультация|интересно|посоветуйте/i) || !msg.match(/ai|ии|чат|бот|аналитик/))) {
            return "Расскажите подробнее о вашем бизнесе и задачах. Какие процессы хотите автоматизировать? Клиентский сервис, аналитика данных или контроль производства? Подберу оптимальное AI-решение.";
        }

        // Turnkey
        if (msg.match(/под ключ|полный цикл|комплексное решение|все этапы/i)) {
            return "Да, мы реализуем проекты «под ключ»: от прототипа до промышленной эксплуатации, SLA и поддержка. Также возможна модель Co-development. Обсудим детали?";
        }

        // Default
        return "Благодарю за вопрос. Как AI-консультант RostOps, я помогаю бизнесу внедрять искусственный интеллект. Уточните, пожалуйста, какая задача вас интересует: автоматизация поддержки, прогнозная аналитика или компьютерное зрение?";
    }

    async function getAIResponse(userMsg, history) {
        return generateResponse(userMsg, history);
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        input.style.height = 'auto';

        addMessage('user', text);
        conversationHistory.push({ role: 'user', content: text });

        showTyping();
        await new Promise(r => setTimeout(r, 450 + Math.random() * 300));

        const reply = await getAIResponse(text, conversationHistory);
        hideTyping();

        addMessage('assistant', reply);
        conversationHistory.push({ role: 'assistant', content: reply });

        if (conversationHistory.length > 20) {
            conversationHistory = conversationHistory.slice(-16);
        }
    }

    function autoResize() {
        const ta = document.getElementById('userInput');
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
    }

    function init() {
        const container = document.getElementById('messagesArea');
        container.innerHTML = '';

        const welcomeMsg = "Приветствую! 👋 Я AI-консультант RostOps. Помогаю бизнесу внедрять искусственный интеллект: от стратегии до готовых решений. Расскажите о вашем проекте — предложу оптимальный подход.";
        const welcomeDiv = document.createElement('div');
        welcomeDiv.classList.add('message', 'assistant-message');
        const icon = document.createElement('div');
        icon.classList.add('message-icon', 'assistant-icon');
        icon.innerHTML = '<i class="fas fa-robot"></i>';
        const bubbleWrap = document.createElement('div');
        bubbleWrap.style.display = 'flex';
        bubbleWrap.style.flexDirection = 'column';
        const bubble = document.createElement('div');
        bubble.classList.add('message-bubble');
        bubble.innerText = welcomeMsg;
        const timeSpan = document.createElement('div');
        timeSpan.classList.add('message-time');
        timeSpan.innerHTML = `<i class="far fa-clock"></i> ${getTime()}`;
        bubbleWrap.appendChild(bubble);
        bubbleWrap.appendChild(timeSpan);
        welcomeDiv.appendChild(icon);
        welcomeDiv.appendChild(bubbleWrap);
        container.appendChild(welcomeDiv);

        conversationHistory = [{ role: 'assistant', content: welcomeMsg }];

        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        userInput.addEventListener('input', autoResize);
        userInput.focus();
    }

    init();
